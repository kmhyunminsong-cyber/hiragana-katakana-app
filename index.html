<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>히라가나 학습</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ひらがな">
  <style>
    :root {
      --bg: #f8f8f6; --surface: #fff; --border: #e5e5e0;
      --text: #1a1a1a; --text-sub: #6b6b6b; --text-muted: #a0a0a0;
      --accent: #2563eb; --accent-bg: #eff6ff;
      --success: #16a34a; --success-bg: #f0fdf4;
      --danger: #dc2626; --danger-bg: #fef2f2;
      --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; }
    .jp { font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; }

    .btn { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: var(--radius); cursor: pointer; -webkit-appearance: none; min-height: 44px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }

    .header { display: flex; align-items: center; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    .header-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; }
    .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
    .header-spacer { min-width: 44px; }

    /* ── 홈 ── */
    .home-body { padding: 16px; }
    .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .level-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: border-color 0.15s; position: relative; overflow: hidden; }
    .level-card.locked { opacity: 0.5; cursor: default; }
    .level-card.unlocked:active { border-color: var(--accent); }
    .level-card .lv-num { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .level-card .lv-rep { font-size: 40px; line-height: 1.1; margin: 2px 0; }
    .level-card .lv-name { font-size: 13px; color: var(--text-sub); font-weight: 500; }
    .level-card .lv-badges { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .lock-icon { position: absolute; top: 10px; right: 10px; font-size: 16px; opacity: 0.4; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 999px; font-weight: 600; }
    .badge-done { background: var(--success-bg); color: var(--success); }
    .badge-partial { background: var(--accent-bg); color: var(--accent); }
    .badge-none { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
    .home-actions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

    /* ── 레벨 상세 ── */
    .lv-detail { padding: 16px; }
    .char-grid { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
    .char-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; text-align: center; min-width: 60px; }
    .char-card .jp-char { font-size: 32px; line-height: 1.1; }
    .char-card .ro-char { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
    .skill-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    .skill-row { display: flex; align-items: center; gap: 10px; }
    .skill-btn { flex: 1; padding: 14px; font-size: 16px; font-weight: 600; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; -webkit-appearance: none; min-height: 44px; text-align: left; }
    .skill-score { font-size: 13px; color: var(--text-muted); min-width: 44px; text-align: right; }
    .skill-score.good { color: var(--success); font-weight: 600; }

    /* ── 믹스/단어 선택 ── */
    .select-body { padding: 16px; }
    .select-desc { font-size: 14px; color: var(--text-sub); margin: 0 0 16px; line-height: 1.5; }
    .section-label { font-size: 13px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
    .check-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    .check-actions button { flex: 1; padding: 8px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; min-height: 36px; }
    .check-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .check-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; transition: border-color 0.1s; user-select: none; }
    .check-item.selected { border-color: var(--accent); background: var(--accent-bg); }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
    .check-item-label { flex: 1; font-size: 15px; font-weight: 500; }
    .check-item-chars { font-size: 18px; }
    .skill-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .skill-tab { flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; min-height: 44px; -webkit-appearance: none; }
    .skill-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .count-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .count-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .count-label { font-size: 15px; font-weight: 700; color: var(--accent); min-width: 52px; text-align: right; }

    /* ── 퀴즈 ── */
    .quiz-screen { display: flex; flex-direction: column; min-height: 100vh; }
    .progress-bar-container { height: 4px; background: var(--border); }
    .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
    .quiz-body { flex: 1; padding: 16px; display: flex; flex-direction: column; }
    .quiz-counter { text-align: right; font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
    .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; margin-bottom: 20px; overflow: hidden; }
    .quiz-main-char { line-height: 1.1; margin-bottom: 4px; overflow-wrap: break-word; word-break: break-all; }
    .quiz-main-romaji { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
    .quiz-hint { font-size: 15px; color: var(--text-sub); margin-top: 6px; }
    .choices-grid { display: grid; gap: 10px; margin-bottom: 16px; }
    .choices-2col { grid-template-columns: 1fr 1fr; }
    .choices-3col { grid-template-columns: 1fr 1fr 1fr; }
    .choice-btn { min-height: 56px; font-size: 18px; font-weight: 500; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; transition: background 0.1s, border-color 0.1s; -webkit-appearance: none; width: 100%; overflow-wrap: break-word; word-break: break-all; padding: 8px; }
    .choice-btn:active { transform: scale(0.97); }
    .choice-btn.correct { background: var(--success-bg); border-color: var(--success); color: var(--success); }
    .choice-btn.wrong   { background: var(--danger-bg);  border-color: var(--danger);  color: var(--danger); }
    .choice-btn.dimmed  { opacity: 0.4; }
    .feedback-area { min-height: 28px; text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .feedback-correct { color: var(--success); }
    .feedback-wrong   { color: var(--danger); }
    .word-meaning { font-size: 20px; font-weight: 700; color: var(--success); text-align: center; margin: 4px 0 12px; display: none; }
    .next-wrap { margin-top: auto; }
    .speak-btn { background: none; border: none; font-size: 22px; cursor: pointer; min-width: 40px; min-height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.1s; }
    .speak-btn:active { background: var(--accent-bg); }
    .note-btn { background: none; border: none; font-size: 20px; cursor: pointer; min-width: 40px; min-height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--text-muted); transition: color 0.15s; }
    .note-btn.noted { color: #f59e0b; }
    .header-right { display: flex; gap: 0; }
    /* ── 오답노트 ── */
    .notes-screen { padding: 0 16px 24px; display: flex; flex-direction: column; min-height: calc(100vh - 56px); }
    .notes-tabs { display: flex; gap: 8px; margin-bottom: 16px; padding-top: 16px; }
    .notes-tab { flex: 1; padding: 8px; border: 1px solid var(--border); background: var(--surface); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .notes-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .notes-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .notes-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
    .notes-char { font-family: var(--jp-font); font-size: 32px; min-width: 48px; text-align: center; line-height: 1; }
    .notes-char-sentence { font-size: 16px; min-width: 72px; max-width: 96px; text-align: left; line-height: 1.3; }
    .notes-info { flex: 1; min-width: 0; }
    .notes-romaji { font-size: 14px; color: var(--text-sub); }
    .notes-meaning { font-size: 14px; color: var(--accent); font-weight: 600; }
    .notes-badge { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-top: 3px; }
    .notes-badge.wrong { background: var(--danger-bg); color: var(--danger); }
    .notes-badge.book { background: #fef3c7; color: #d97706; }
    .notes-del { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 4px 8px; flex-shrink: 0; }
    .notes-empty { text-align: center; color: var(--text-muted); padding: 64px 0; font-size: 16px; line-height: 2; }
    .accordion-header { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; margin-bottom:2px; user-select:none; }
    .accordion-header:active { background:var(--accent-bg); }
    .accordion-title { font-size:14px; font-weight:600; }
    .accordion-meta { font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:8px; }
    .accordion-arrow { font-size:11px; transition:transform 0.2s; }
    .accordion-arrow.open { transform:rotate(180deg); }
    .accordion-body { margin-bottom:6px; }
    .type-input { width:100%; padding:14px 16px; font-size:20px; border:2px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); outline:none; text-align:center; -webkit-appearance:none; }
    .type-input:focus { border-color:var(--accent); }
    .read-flash-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px 20px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px; margin-bottom:20px; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; }
    .read-flash-card:active { background:var(--accent-bg); }
    .rf-char { line-height:1.1; }
    .rf-reading { font-size:26px; font-weight:700; color:var(--accent); }
    .rf-tap-hint { font-size:13px; color:var(--text-muted); }
    /* ── 쓰기 캔버스 ── */
    .draw-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
    #draw-canvas { border:2px solid var(--border); border-radius:12px; background:#fff; touch-action:none; cursor:crosshair; width:280px; height:280px; max-width:90vw; max-height:90vw; }
    .draw-btns { display:flex; gap:8px; width:100%; max-width:280px; }
    .btn-success { background:var(--success); color:#fff; border:1px solid var(--success); border-radius:var(--radius); padding:12px; font-size:16px; font-weight:600; cursor:pointer; }

    /* ── 말하기 ── */
    .speak-area { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
    .mic-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 32px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.1s; -webkit-appearance: none; }
    .mic-btn.listening { background: var(--danger); }
    .mic-btn:active { transform: scale(0.95); }
    .speak-status { font-size: 14px; color: var(--text-muted); text-align: center; }
    .speak-recognized { font-size: 28px; font-weight: 600; color: var(--text-sub); min-height: 36px; }

    /* ── 단어 플래시카드 ── */
    .flash-screen { display: flex; flex-direction: column; min-height: 100vh; }
    .flash-body { flex: 1; padding: 16px; display: flex; flex-direction: column; }
    .flash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 20px; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .flash-jp { line-height: 1.1; overflow-wrap: break-word; word-break: break-all; max-width: 100%; }
    .flash-romaji { font-size: 22px; color: var(--text-sub); font-weight: 600; letter-spacing: 1px; }
    .flash-meaning { font-size: 20px; color: var(--accent); font-weight: 700; }
    .flash-counter { text-align: right; font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

    /* ── 결과 ── */
    .result-screen { padding: 32px 16px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; min-height: 100vh; }
    .result-icon { font-size: 64px; }
    .result-score { font-size: 72px; font-weight: 800; line-height: 1; }
    .result-score.pass { color: var(--success); }
    .result-score.fail { color: var(--danger); }
    .result-detail { font-size: 18px; color: var(--text-sub); }
    .result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: auto; }
    .info-box { background: var(--accent-bg); border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px; font-size: 14px; color: var(--accent); text-align: center; margin: 12px 0; line-height: 1.5; }
    .word-done { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 40px 16px; text-align: center; }
    .word-done-icon { font-size: 64px; }
    .word-done-msg { font-size: 20px; font-weight: 700; }
    .word-done-sub { font-size: 14px; color: var(--text-sub); }
  </style>
</head>

function loadNotes() {
  try { const s=localStorage.getItem('hiragana_notes'); wrongNotes=s?JSON.parse(s):{}; } catch(e){wrongNotes={};}
}
function saveNotes() { localStorage.setItem('hiragana_notes',JSON.stringify(wrongNotes)); }
function isNoted(cur) { const n=wrongNotes[cur.char]; return n&&(n.bookmarked||n.count>0); }
function addWrong(cur) {
  const key=cur.char, kind=cur.type==='word'?'word':cur.type==='sentence'?'sentence':'char';
  if(!wrongNotes[key]) wrongNotes[key]={char:cur.char,romaji:cur.romaji,meaning:cur.meaning||'',kind,count:0,bookmarked:false};
  wrongNotes[key].count++;
  saveNotes();
}
function toggleNote() {
  const cur=state.quiz?.questions[state.quiz.current]; if(!cur) return;
  const key=cur.char, kind=cur.type==='word'?'word':cur.type==='sentence'?'sentence':'char';
  if(!wrongNotes[key]) wrongNotes[key]={char:cur.char,romaji:cur.romaji,meaning:cur.meaning||'',kind,count:0,bookmarked:true};
  else wrongNotes[key].bookmarked=!wrongNotes[key].bookmarked;
  if(!wrongNotes[key].bookmarked&&wrongNotes[key].count===0) delete wrongNotes[key];
  saveNotes();
  const btn=document.getElementById('note-btn');
  if(btn){const noted=isNoted(cur);btn.textContent=noted?'★':'☆';btn.className='note-btn'+(noted?' noted':'');}
}
function deleteNote(key) { delete wrongNotes[key]; saveNotes(); renderNotes(); }
function clearAllNotes() { if(confirm('오답노트를 모두 삭제할까요?')){wrongNotes={};saveNotes();renderNotes();} }

function initProgress() {
  const p = {};
  ALL_LEVELS.forEach(l => { p[l.id] = { unlocked: true, read: -1, write: -1, speak: -1 }; });
  return p;
}

function loadState() {
  try {
    const saved = localStorage.getItem('hiragana_progress');
    state.progress = saved ? JSON.parse(saved) : initProgress();
  } catch(e) { state.progress = initProgress(); }
  ALL_LEVELS.forEach(l => {
    if (!state.progress[l.id]) state.progress[l.id] = { unlocked: true, read: -1, write: -1, speak: -1 };
    else state.progress[l.id].unlocked = true;
  });
}

function saveState() { localStorage.setItem('hiragana_progress', JSON.stringify(state.progress)); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// 모든 항목 최소 1번, 연속 중복 방지
function buildPool(items, count) {
  if (!items.length) return [];
  const result = [];
  while (result.length < count) {
    const round = shuffle([...items]);
    if (result.length > 0 && round.length > 1) {
      const prevKey = JSON.stringify(result[result.length - 1]);
      if (JSON.stringify(round[0]) === prevKey) [round[0], round[1]] = [round[1], round[0]];
    }
    result.push(...round.slice(0, count - result.length));
  }
  return result;
}

function katakanaToHiragana(s) { return s.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60)); }
function pct(v) { return v < 0 ? '―' : v + '%'; }
function esc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function charSize(s) { const n=[...s].length; return n<=2?'80px':n<=4?'60px':'44px'; }

function charToKo(s) {
  const chars=[...katakanaToHiragana(s)];
  let out='';
  for (let i=0;i<chars.length;i++) {
    const pair=chars[i]+(chars[i+1]||'');
    if (CHAR_KO[pair]) { out+=CHAR_KO[pair]; i++; }
    else out+=CHAR_KO[chars[i]]||chars[i];
  }
  return out;
}
function fmtR(romaji, char, html=false) {
  const ko = char ? charToKo(char) : (ROMAJI_KO[romaji]||'');
  if (!ko || ko===char) return romaji;
  if (html) return `${romaji}<br><small style="font-weight:normal;font-size:0.72em;opacity:0.7">${ko}</small>`;
  return `${romaji}, ${ko}`;
}

let drawCtx=null, isDrawing=false, lastX=0, lastY=0;

function getPos(canvas, e) {
  const r=canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)*canvas.width/r.width, y:(e.clientY-r.top)*canvas.height/r.height };
}

function initDrawCanvas(char, practice) {
  const c=document.getElementById('draw-canvas'); if(!c) return;
  const w=c.width, h=c.height;
  drawCtx=c.getContext('2d');
  drawCtx.clearRect(0,0,w,h);
  // 그리드
  drawCtx.save();
  drawCtx.strokeStyle='#e2e8f0'; drawCtx.lineWidth=1; drawCtx.setLineDash([4,4]);
  drawCtx.beginPath(); drawCtx.moveTo(w/2,0); drawCtx.lineTo(w/2,h); drawCtx.moveTo(0,h/2); drawCtx.lineTo(w,h/2); drawCtx.stroke();
  drawCtx.setLineDash([]); drawCtx.restore();

  if (practice) {
    // 반투명 글자 배경
    drawCtx.save();
    drawCtx.globalAlpha=0.10; drawCtx.fillStyle='#334155';
    drawCtx.font=`${w*0.76}px 'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif`; drawCtx.textAlign='center'; drawCtx.textBaseline='middle';
    drawCtx.fillText(char, w/2, h/2+h*0.03);
    drawCtx.restore();
    // 획 순서 가이드
    const BASE_MAP={'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ','ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ','だ':'た','ぢ':'ち','づ':'つ','で':'て','ど':'と','ば':'は','び':'ひ','ぶ':'ふ','べ':'へ','ぼ':'ほ','ぱ':'は','ぴ':'ひ','ぷ':'ふ','ぺ':'へ','ぽ':'ほ'};
    const guide=STROKE_GUIDE[char]||STROKE_GUIDE[BASE_MAP[char]]; if(guide) guide.forEach(([xp,yp,ang],i)=>{
      const x=xp*w, y=yp*h;
      drawCtx.save();
      // 원
      drawCtx.fillStyle='#2563eb'; drawCtx.beginPath(); drawCtx.arc(x,y,11,0,Math.PI*2); drawCtx.fill();
      drawCtx.fillStyle='#fff'; drawCtx.font='bold 11px sans-serif'; drawCtx.textAlign='center'; drawCtx.textBaseline='middle';
      drawCtx.fillText(i+1,x,y);
      // 화살표
      if(ang!==undefined){
        const rad=ang*Math.PI/180, len=20;
        const ax=x+Math.cos(rad)*len, ay=y+Math.sin(rad)*len;
        drawCtx.strokeStyle='#2563eb'; drawCtx.lineWidth=2; drawCtx.beginPath();
        drawCtx.moveTo(x,y); drawCtx.lineTo(ax,ay);
        const al=7, aa=0.45;
        drawCtx.lineTo(ax-al*Math.cos(rad-aa),ay-al*Math.sin(rad-aa));
        drawCtx.moveTo(ax,ay);
        drawCtx.lineTo(ax-al*Math.cos(rad+aa),ay-al*Math.sin(rad+aa));
        drawCtx.stroke();
      }
      drawCtx.restore();
    });
  }

  const pen = (x1,y1,x2,y2) => {
    drawCtx.strokeStyle='#1e293b'; drawCtx.lineWidth=4; drawCtx.lineCap='round'; drawCtx.lineJoin='round';
    drawCtx.beginPath(); drawCtx.moveTo(x1,y1); drawCtx.lineTo(x2,y2); drawCtx.stroke();
  };
  c.onmousedown=e=>{isDrawing=true;const p=getPos(c,e);lastX=p.x;lastY=p.y;};
  c.onmousemove=e=>{if(!isDrawing)return;const p=getPos(c,e);pen(lastX,lastY,p.x,p.y);lastX=p.x;lastY=p.y;};
  c.onmouseup=c.onmouseleave=()=>{isDrawing=false;};
  c.ontouchstart=e=>{e.preventDefault();isDrawing=true;const p=getPos(c,e.touches[0]);lastX=p.x;lastY=p.y;};
  c.ontouchmove=e=>{e.preventDefault();if(!isDrawing)return;const p=getPos(c,e.touches[0]);pen(lastX,lastY,p.x,p.y);lastX=p.x;lastY=p.y;};
  c.ontouchend=()=>{isDrawing=false;};
}

function clearCanvas() {
  const cur=state.quiz?.questions[state.quiz.current]; if(!cur) return;
  initDrawCanvas(cur.char,!!state.quiz.isPracticeWrite);
}

function checkDraw(char) {
  if(!drawCtx) return;
  const c=document.getElementById('draw-canvas');
  drawCtx.save();
  drawCtx.globalAlpha=0.28; drawCtx.fillStyle='#dc2626';
  drawCtx.font=`${c.width*0.76}px 'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif`; drawCtx.textAlign='center'; drawCtx.textBaseline='middle';
  drawCtx.fillText(char,c.width/2,c.height/2+c.height*0.03);
  drawCtx.restore();
  const d=document.getElementById('draw-btns'); if(!d) return;
  d.innerHTML=`<div style="text-align:center;font-size:13px;color:var(--text-sub);margin-bottom:6px">빨간 글자와 비교해보세요</div>
    <div style="display:flex;gap:8px;width:100%">
      <button class="btn btn-success" style="flex:1" onclick="judgeDraw(true)">✓ 맞아요</button>
      <button class="btn btn-danger" style="flex:1" onclick="judgeDraw(false)">✗ 틀렸어요</button>
    </div>`;
}

function judgeDraw(correct) {
  if(quizAnswered) return; quizAnswered=true;
  const cur=state.quiz.questions[state.quiz.current];
  if(correct) state.quiz.score++; else addWrong(cur);
  state.quiz.answers.push(correct);
  speakNow(cur.char);
  const fb=document.getElementById('fb');
  if(fb){fb.textContent=correct?'✓ 정답!':'✗ 오답 — 정답: '+cur.char;fb.className='feedback-area '+(correct?'feedback-correct':'feedback-wrong');}
  const d=document.getElementById('draw-btns'); if(d) d.innerHTML='';
  const nxt=document.getElementById('nxt'); if(nxt) nxt.style.display='block';
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

function speakNow(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 1.0;
  requestAnimationFrame(() => speechSynthesis.speak(u));
}

function speakCurrent() {
  if (state.screen === 'quiz' && state.quiz) {
    const cur = state.quiz.questions[state.quiz.current];
    if (cur) speak(cur.char);
  } else if (state.screen === 'wordFlash' && state.wordFlash) {
    const w = state.wordFlash.words[state.wordFlash.current];
    if (w) speak(w.w);
  }
}

function mkReadQ(lvId, count) {
  const lv = ALL_LEVELS.find(l => l.id === lvId);
  const allChars = ALL_LEVELS.filter(l => l.script===lv.script).flatMap(l => l.chars);
  return buildPool(lv.chars, count || lv.chars.length * 2).map(([char, romaji]) => ({
    type:'read', char, romaji, answer:romaji,
    choices: shuffle([romaji, ...shuffle(allChars.filter(([,r])=>r!==romaji)).slice(0,3).map(([,r])=>r)]),
  }));
}

function mkWriteQ(lvId, count) {
  const lv = ALL_LEVELS.find(l => l.id === lvId);
  const allChars = ALL_LEVELS.filter(l => l.script===lv.script).flatMap(l => l.chars);
  return buildPool(lv.chars, count || lv.chars.length * 2).map(([char, romaji]) => ({
    type:'write', char, romaji, answer:char,
    choices: shuffle([char, ...shuffle(allChars.filter(([c])=>c!==char)).slice(0,5).map(([c])=>c)]),
  }));
}

function mkSpeakQ(lvId) {
  const lv = ALL_LEVELS.find(l => l.id === lvId);
  return shuffle(lv.chars).map(([char,romaji]) => ({type:'speak',char,romaji,answer:char}));
}

function mkWordQ(maxLvId) {
  const avail = WORDS.filter(w => w.lv <= maxLvId);
  if (!avail.length) return [];
  return shuffle(avail);
}

function mkMixReadQ(ids, count) {
  const chars = ALL_LEVELS.filter(l => ids.includes(l.id)).flatMap(l => l.chars);
  const allR = [...new Set(chars.map(([,r])=>r))];
  return buildPool(chars, count).map(([char,romaji]) => ({
    type:'read', char, romaji, answer:romaji,
    choices: shuffle([romaji, ...shuffle(allR.filter(r=>r!==romaji)).slice(0,3)]),
  }));
}

function mkMixWriteQ(ids, count) {
  const chars = ALL_LEVELS.filter(l => ids.includes(l.id)).flatMap(l => l.chars);
  const allC = chars.map(([c])=>c);
  return buildPool(chars, count).map(([char,romaji]) => ({
    type:'write', char, romaji, answer:char,
    choices: shuffle([char, ...shuffle(allC.filter(c=>c!==char)).slice(0,5)]),
  }));
}

function mkMixSpeakQ(ids, count) {
  const chars = ALL_LEVELS.filter(l => ids.includes(l.id)).flatMap(l => l.chars);
  return buildPool(chars, count).map(([char,romaji]) => ({type:'speak',char,romaji,answer:char}));
}

function mkReadTypeQ(lvId, count) {
  const lv = ALL_LEVELS.find(l=>l.id===lvId);
  return buildPool(lv.chars, count||lv.chars.length*2).map(([char,romaji])=>({type:'readType',char,romaji,answer:romaji}));
}
function mkMixReadTypeQ(ids, count) {
  const chars = ALL_LEVELS.filter(l=>ids.includes(l.id)).flatMap(l=>l.chars);
  return buildPool(chars, count).map(([char,romaji])=>({type:'readType',char,romaji,answer:romaji}));
}

function mkMixWordTypeQ(ids, count) {
  const charSet = new Set(ALL_LEVELS.filter(l=>ids.includes(l.id)).flatMap(l=>l.chars.map(([c])=>c)));
  const avail = WORDS.filter(w => [...w.w].every(ch => charSet.has(ch)));
  if (!avail.length) return null;
  const pool = buildPool(avail.map(w=>[w.w,w.r,w.m]), count||avail.length);
  return pool.map(([cw,cr,cm]) => ({type:'wordType', char:cw, romaji:cr, meaning:cm, answer:cr}));
}

function mkMixWordQ(ids, count) {
  const charSet = new Set(ALL_LEVELS.filter(l=>ids.includes(l.id)).flatMap(l=>l.chars.map(([c])=>c)));
  const avail = WORDS.filter(w => [...w.w].every(ch => charSet.has(ch)));
  if (!avail.length) return null;
  const allR = [...new Set(avail.map(w=>w.r))];
  const pool = buildPool(avail.map(w=>[w.w,w.r,w.m]), count||avail.length);
  return pool.map(([cw,cr,cm]) => ({
    type:'word', char:cw, romaji:cr, meaning:cm, answer:cr,
    choices: shuffle([cr, ...shuffle(allR.filter(r=>r!==cr)).slice(0,3)]),
  }));
}

function mkSentenceQ(cats, count) {
  const pool = cats && cats.length ? SENTENCES.filter(x=>cats.includes(x.cat)) : SENTENCES;
  return shuffle(pool).slice(0, count||pool.length).map(x => ({
    type:'sentence', char:x.s, romaji:x.r, meaning:x.m, answer:x.r,
  }));
}

      <div class="progress-bar-container"><div class="progress-bar-fill" style="width:${pbar}%"></div></div>
      <div class="quiz-body">
        <div class="quiz-counter">${q.current+1} / ${total}</div>
        ${body}
        <div id="fb" class="feedback-area"></div>
        ${cur.type==='word'?'<div id="meaning" class="word-meaning"></div>':''}
        ${cur.type!=='speak'?'<div class="next-wrap"><button class="btn btn-primary" id="nxt" style="display:none" onclick="nextQ()">다음 →</button></div>':''}
      </div>
    </div>`;
  if (cur.type==='write') requestAnimationFrame(()=>initDrawCanvas(cur.char,!!q.isPracticeWrite));
  if (cur.type==='readType'||cur.type==='wordType'||cur.type==='sentence') requestAnimationFrame(()=>document.getElementById('type-input')?.focus());
}

function readBody(cur) {
  const btns = cur.choices.map(c =>
    `<button class="choice-btn" data-v="${esc(c)}" onclick="choose(this,'${esc(c)}','${esc(cur.answer)}','${esc(cur.meaning||'')}')">${fmtR(c, null, true)}</button>`
  ).join('');
  return `
    <div class="quiz-card">
      <div class="quiz-main-char jp" style="font-size:${charSize(cur.char)}">${cur.char}</div>
    </div>
    <div class="choices-grid choices-2col">${btns}</div>`;
}

function writeBody(cur) {
  const practice = !!state.quiz.isPracticeWrite;
  return `
    <div class="quiz-card" style="padding:12px 8px;gap:6px">
      <div class="quiz-main-romaji">${fmtR(cur.romaji, cur.char)}</div>
      ${practice?`<div class="quiz-hint" style="font-size:12px">반투명 글자를 따라 써보세요 · 획 번호 순서대로</div>`:`<div class="quiz-hint">${/[ァ-ヶ]/.test(cur.char)?'카타카나':'히라가나'}를 직접 써보세요</div>`}
      <div class="draw-wrap">
        <canvas id="draw-canvas" width="280" height="280"></canvas>
      </div>
    </div>
    <div id="draw-btns" class="draw-btns" style="justify-content:center">
      <button class="btn btn-secondary" style="flex:1;max-width:130px" onclick="clearCanvas()">지우기</button>
      <button class="btn btn-primary" style="flex:1;max-width:130px" onclick="checkDraw('${esc(cur.char)}')">확인</button>
    </div>`;
}

function typeBody(cur) {
  const isWord = cur.type==='wordType';
  const isSentence = cur.type==='sentence';
  const hint = isSentence ? '로마자 또는 한글 발음으로 읽어보세요' : isWord ? '발음 또는 뜻을 입력하세요' : '로마자 또는 한국어 발음을 입력하세요';
  const ph = isSentence ? '예) ohayou gozaimasu  또는  오하요우고자이마스' : isWord ? '예) tako  또는  문어' : '예) a  또는  아';
  const charSz = isSentence ? sentenceCharSize(cur.char) : charSize(cur.char);
  return `
    <div class="quiz-card">
      <div class="quiz-main-char jp" style="font-size:${charSz}">${cur.char}</div>
      <div class="quiz-hint">${hint}</div>
    </div>
    <div style="padding:0 8px;display:flex;flex-direction:column;gap:10px">
      <input type="text" id="type-input" class="type-input" placeholder="${ph}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter'){event.stopPropagation();checkType();}">
      <button class="btn btn-primary" onclick="checkType()">확인</button>
    </div>`;
}
function sentenceCharSize(s) { const n=[...s].length; return n<=8?'32px':n<=14?'26px':n<=20?'22px':'18px'; }
function normLoose(s) { return s.toLowerCase().replace(/[,.!?、。！？'’ ]/g,''); }

function checkType() {
  if(quizAnswered) return;
  const input=document.getElementById('type-input'); if(!input) return;
  const val=input.value.trim().toLowerCase(); if(!val) return;
  quizAnswered=true;
  const cur=state.quiz.questions[state.quiz.current];
  const isWord = cur.type==='wordType';
  const isSentence = cur.type==='sentence';
  const ko=charToKo(cur.char);
  const meaning=(cur.meaning||'').toLowerCase();
  let correct;
  if (isSentence) {
    correct = normLoose(val)===normLoose(cur.romaji) || normLoose(val)===normLoose(ko);
  } else {
    correct = val===cur.romaji.toLowerCase() || val===ko || (isWord && meaning && val===meaning);
  }
  speakNow(cur.char);
  if(correct) state.quiz.score++; else addWrong(cur);
  state.quiz.answers.push(correct);
  input.disabled=true;
  const fb=document.getElementById('fb');
  if(fb){
    const ans = (isWord||isSentence) ? `<b>${cur.romaji}</b> (${ko}) · ${cur.meaning||''}` : `<b>${cur.romaji}</b> (${ko})`;
    const ok = (isWord||isSentence)
      ? `✓ 정답! <span style="font-size:15px;font-weight:normal">${cur.romaji} (${ko}) · ${cur.meaning||''}</span>`
      : `✓ 정답! <span style="font-size:15px;font-weight:normal">${cur.romaji} (${ko})</span>`;
    fb.innerHTML = correct ? ok : `✗ 오답 — 정답: ${ans}`;
    fb.className='feedback-area '+(correct?'feedback-correct':'feedback-wrong');
  }
  const nxt=document.getElementById('nxt'); if(nxt) nxt.style.display='block';
}

function speakBody(cur) {
  const ok = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
  if (!ok) return `
    <div class="quiz-card">
      <div class="quiz-main-char jp" style="font-size:${charSize(cur.char)}">${cur.char}</div>
      <div class="quiz-hint">${fmtR(cur.romaji, cur.char)}</div>
    </div>
    <div class="info-box">🎤 말하기 기능은 Chrome 브라우저에서 사용하세요.</div>
    <div class="next-wrap"><button class="btn btn-secondary" onclick="skipSpeak()">건너뛰기</button></div>`;
  return `
    <div class="quiz-card">
      <div class="quiz-main-char jp" style="font-size:${charSize(cur.char)}">${cur.char}</div>
      <div class="quiz-hint">${fmtR(cur.romaji, cur.char)}</div>
    </div>
    <div class="speak-area">
      <button class="mic-btn" id="mic" onclick="toggleMic()">🎤</button>
      <div class="speak-status" id="mic-status">버튼을 누르고 말해보세요</div>
      <div class="speak-recognized jp" id="mic-result"></div>
    </div>
    <div class="next-wrap"><button class="btn btn-primary" id="nxt" style="display:none" onclick="nextQ()">다음 →</button></div>`;
}

function choose(btn, chosen, answer, meaning) {
  if (quizAnswered) return;
  quizAnswered = true;
  const correct = chosen === answer;
  const cur = state.quiz.questions[state.quiz.current];
  speakNow(cur.char);
  if (correct) state.quiz.score++;
  else addWrong(cur);
  state.quiz.answers.push(correct);
  document.querySelectorAll('.choice-btn').forEach(b => {
    const val = b.dataset.v ?? b.textContent.trim();
    if (val===answer) b.classList.add('correct');
    else if (val===chosen) b.classList.add('wrong');
    else b.classList.add('dimmed');
    b.disabled=true;
  });
  const fb=document.getElementById('fb');
  if(fb){
    const isWord=cur.type==='word';
    const ko=isWord?charToKo(cur.char):'';
    const pron=isWord&&correct?`<div style="font-size:14px;font-weight:normal;margin-top:3px">${cur.romaji} (${ko})</div>`:'';
    fb.innerHTML=correct
      ?'✓ 정답!'+pron
      :'✗ 오답 — 정답: '+answer+(isWord?` (${ko})`:'');
    fb.className='feedback-area '+(correct?'feedback-correct':'feedback-wrong');
  }
  if(meaning){const m=document.getElementById('meaning');if(m&&correct){m.textContent='🇰🇷 '+meaning;m.style.display='block';}}
  const nxt=document.getElementById('nxt');if(nxt)nxt.style.display='block';
}

function toggleMic(){micListening?stopMic():startMic();}
function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
  recognition=new SR();recognition.lang='ja-JP';recognition.interimResults=false;recognition.maxAlternatives=3;
  document.getElementById('mic')?.classList.add('listening');
  const status=document.getElementById('mic-status');if(status)status.textContent='듣고 있어요...';
  micListening=true;
  recognition.onresult=e=>{
    const transcripts=Array.from({length:e.results[0].length},(_,i)=>e.results[0][i].transcript);
    const hira=katakanaToHiragana(transcripts[0]);
    const res=document.getElementById('mic-result');if(res)res.textContent=hira;
    const cur=state.quiz.questions[state.quiz.current];
    const correct=transcripts.some(t=>katakanaToHiragana(t)===katakanaToHiragana(cur.char));
    if(correct)state.quiz.score++;state.quiz.answers.push(correct);quizAnswered=true;
    const fb=document.getElementById('fb');
    if(fb){fb.textContent=correct?'✓ 정답!':'✗ 오답 — 정답: '+cur.char;fb.className='feedback-area '+(correct?'feedback-correct':'feedback-wrong');}
    const nxt=document.getElementById('nxt');if(nxt)nxt.style.display='block';
    stopMic();
  };
  recognition.onerror=e=>{
    const s=document.getElementById('mic-status');
    if(s)s.textContent=e.error==='not-allowed'?'마이크 접근 권한이 거부됐어요.':'인식 실패. 다시 시도하세요.';
    stopMic();
  };
  recognition.onend=()=>stopMic();
  recognition.start();
}
function stopMic(){
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  micListening=false;
  document.getElementById('mic')?.classList.remove('listening');
  const s=document.getElementById('mic-status');if(s&&s.textContent==='듣고 있어요...')s.textContent='버튼을 누르고 말해보세요';
}
function skipSpeak(){state.quiz.answers.push(false);nextQ();}

function nextQ(){
  state.quiz.current++;
  if(state.quiz.current>=state.quiz.questions.length) finishQuiz();
  else render();
}

function finishQuiz(){
  const q=state.quiz;
  const scorePct=q.questions.length>0?Math.round(q.score/q.questions.length*100):0;
  if(!q.isMix&&q.sourceId){
    const sk = q.scoreKey||q.skill;
    state.progress[q.sourceId][sk]=scorePct;
    saveState();
  }
  q.resultScore=scorePct;
  state.screen='result';render();
}

// ── 단어 플래시카드 ──────────────────────────────────────────────
function renderWordFlash() {
  const wf = state.wordFlash;
  const total = wf.words.length;
  const idx = wf.current;
  const pbar = total>0?(idx/total*100):0;

  if (idx >= total) {
    app.innerHTML = `
      <div class="header"><button class="back-btn" onclick="goWordSelect()">‹</button><div class="header-title">단어 연습</div><div class="header-spacer"></div></div>
      <div class="word-done">
        <div class="word-done-icon">🎉</div>
        <div class="word-done-msg">모든 단어 완료!</div>
        <div class="word-done-sub">${total}개 단어를 학습했어요</div>
        <div style="width:100%;margin-top:24px;display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-primary" onclick="startWordFlash()">다시 보기</button>
          <button class="btn btn-secondary" onclick="goWordSelect()">행 선택으로</button>
          <button class="btn btn-secondary" onclick="goHome()">홈으로</button>
        </div>
      </div>`;
    return;
  }

  const w = wf.words[idx];
  app.innerHTML = `
    <div class="flash-screen">
      <div class="header"><button class="back-btn" onclick="quizBack()">‹</button><div class="header-title">단어 연습</div><button class="speak-btn" onclick="speakCurrent()" title="발음 듣기">🔊</button></div>
      <div class="progress-bar-container"><div class="progress-bar-fill" style="width:${pbar}%"></div></div>
      <div class="flash-body">
        <div class="flash-counter">${idx+1} / ${total}</div>
        <div class="flash-card">
          <div class="flash-jp jp" style="font-size:${charSize(w.w)}">${w.w}</div>
          <div class="flash-romaji">${fmtR(w.r, w.w)}</div>
          <div class="flash-meaning">${w.m}</div>
        </div>
        <div class="next-wrap">
          <button class="btn btn-primary" onclick="nextFlash()">${idx+1<total?'다음 →':'완료 ✓'}</button>
        </div>
      </div>
    </div>`;
}

function nextFlash() { state.wordFlash.current++; renderWordFlash(); }

// ── 결과 ─────────────────────────────────────────────────────
function renderResult() {
  const q=state.quiz;
  const pass=q.resultScore>=80;
  app.innerHTML = `
    <div class="result-screen">
      <div class="result-icon">${pass?'🎊':'📚'}</div>
      <div class="result-score ${pass?'pass':'fail'}">${q.resultScore}%</div>
      <div class="result-detail">${q.score} / ${q.questions.length} 정답</div>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="retryQuiz()">다시 도전</button>
        ${q.sourceId?`<button class="btn btn-secondary" onclick="goLevel(${q.sourceId})">레벨로 돌아가기</button>`:''}
        <button class="btn btn-secondary" onclick="goHome()">홈으로</button>
      </div>
    </div>`;
}

// ── 오답노트 ──────────────────────────────────────────────────
function renderNotes() {
  const all = Object.values(wrongNotes);
  const tabs = [{id:'all',label:'전체'},{id:'char',label:'낱자'},{id:'word',label:'단어'},{id:'sentence',label:'문장'}];
  const tabHtml = tabs.map(t=>`<button class="notes-tab ${notesTab===t.id?'active':''}" onclick="notesTab='${t.id}';renderNotes()">${t.label}</button>`).join('');
  const filtered = notesTab==='all' ? all : all.filter(n=>n.kind===notesTab);
  let listHtml = '';
  if (!filtered.length) {
    listHtml = '<div class="notes-empty">아직 기록된 항목이 없어요.<br>틀리거나 ☆ 표시한 항목이 여기에 쌓여요.</div>';
  } else {
    listHtml = filtered.sort((a,b)=>b.count-a.count).map(n=>`
      <div class="notes-item">
        <div class="notes-char jp${n.kind==='sentence'?' notes-char-sentence':''}">${n.char}</div>
        <div class="notes-info">
          <div class="notes-romaji">${n.kind==='sentence'?`${n.romaji}${n.meaning?' · '+n.meaning:''}`:`${fmtR(n.romaji, n.char)}${n.meaning?' · '+n.meaning:''}`}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">
            ${n.count>0?`<span class="notes-badge wrong">오답 ${n.count}회</span>`:''}
            ${n.bookmarked?'<span class="notes-badge book">★ 북마크</span>':''}
          </div>
        </div>
        <button class="speak-btn" style="font-size:18px" onclick="speak('${esc(n.char)}')">🔊</button>
        <button class="notes-del" onclick="deleteNote('${esc(n.char)}')">✕</button>
      </div>`).join('');
  }
  app.innerHTML = `
    <div class="header"><button class="back-btn" onclick="goHome()">‹</button><div class="header-title">📝 오답노트</div><div class="header-spacer"></div></div>
    <div class="notes-screen">
      <div class="notes-tabs">${tabHtml}</div>
      <div class="notes-list">${listHtml}</div>
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary" ${filtered.length?'':'disabled'} onclick="startNotesQuiz()">오답으로 시험 보기</button>
        <button class="btn btn-danger" style="font-size:13px" onclick="clearAllNotes()">전체 삭제</button>
      </div>
    </div>`;
}

function startNotesQuiz() {
  const all = Object.values(wrongNotes);
  const filtered = notesTab==='all' ? all : all.filter(n=>n.kind===notesTab);
  if (!filtered.length) return;
  const allR = [...new Set(filtered.filter(n=>n.kind!=='sentence').map(n=>n.romaji))];
  const qs = shuffle(filtered).map(n => n.kind==='sentence' ? {
    type:'sentence', char:n.char, romaji:n.romaji, meaning:n.meaning||'', answer:n.romaji,
  } : {
    type: n.kind==='word'?'word':'read',
    char: n.char, romaji: n.romaji, meaning: n.meaning||'', answer: n.romaji,
    choices: shuffle([n.romaji, ...shuffle(allR.filter(r=>r!==n.romaji)).slice(0,3)]),
  });
  const label = {all:'전체',char:'낱자',word:'단어',sentence:'문장'}[notesTab];
  state.quiz = {questions:qs,current:0,score:0,answers:[],skill:'read',isMix:false,sourceId:null,isNotes:true,title:`오답노트 · ${label}`,resultScore:0};
  state.screen='quiz'; render();
}

// ═══════════════════════════════════════════════════════════════
// STARTERS
// ═══════════════════════════════════════════════════════════════

function startLvQuiz(lvId, skill) {
  const isPracticeWrite = skill==='writePractice';
  const realSkill = isPracticeWrite ? 'write' : skill;
  let qs;
  if (realSkill==='read') qs=mkReadQ(lvId);
  else if (realSkill==='readType') qs=mkReadTypeQ(lvId);
  else if (realSkill==='write') qs=mkWriteQ(lvId);
  else qs=mkSpeakQ(lvId);
  const lv=ALL_LEVELS.find(l=>l.id===lvId);
  const label={read:'읽기 LV1',readType:'읽기 LV2',write:isPracticeWrite?'쓰기 연습':'쓰기 테스트',speak:'말하기'}[realSkill]||'쓰기';
  const scoreKey = realSkill==='readType'?'read':realSkill;
  state.quiz={questions:qs,current:0,score:0,answers:[],skill:realSkill,scoreKey,isMix:false,isPracticeWrite,sourceId:lvId,title:`${lv.name} · ${label}`,resultScore:0};
  state.screen='quiz';render();
}

function startWordFlash() {
  let words;
  if (wordSelected.length > 0) {
    const charSet=new Set(LEVELS.filter(l=>wordSelected.includes(l.id)).flatMap(l=>l.chars.map(([c])=>c)));
    words=WORDS.filter(w=>[...w.w].every(ch=>charSet.has(ch)));
  } else {
    words=[...WORDS];
  }
  if (!words.length) { alert('선택한 행의 조합으로 출제 가능한 단어가 없어요. 다른 행을 추가해보세요.'); return; }
  state.wordFlash={words:shuffle(words),current:0};
  state.screen='wordFlash';render();
}

function startMixQuiz() {
  if (!mixSelected.length) return;
  let qs;
  if (mixSkill==='read') qs=mkMixReadQ(mixSelected,mixCount);
  else if (mixSkill==='readType') qs=mkMixReadTypeQ(mixSelected,mixCount);
  else if (mixSkill==='write') qs=mkMixWriteQ(mixSelected,mixCount);
  else if (mixSkill==='speak') qs=mkMixSpeakQ(mixSelected,mixCount);
  else if (mixSkill==='wordType') {
    qs=mkMixWordTypeQ(mixSelected,mixCount);
    if (!qs){alert('선택한 행의 조합으로 만들 수 있는 단어가 없어요. 다른 행을 추가해보세요.');return;}
  } else {
    qs=mkMixWordQ(mixSelected,mixCount);
    if (!qs){alert('선택한 행의 조합으로 만들 수 있는 단어가 없어요. 다른 행을 추가해보세요.');return;}
  }
  const label={read:'읽기 LV1',readType:'읽기 LV2',write:'쓰기',speak:'말하기',word:'단어 LV1',wordType:'단어 LV2'}[mixSkill];
  state.quiz={questions:qs,current:0,score:0,answers:[],skill:mixSkill,isMix:true,sourceId:null,title:`테스트 · ${label} · ${mixCount}문제`,resultScore:0};
  state.screen='quiz';render();
}

function retryQuiz() {
  const q=state.quiz;
  if(q.skill==='sentence') startSentenceQuiz();
  else if(q.isMix) startMixQuiz();
  else startLvQuiz(q.sourceId,q.skill);
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════

function goHome(){state.screen='kanaHome';render();}
function goNotes(){state.screen='notes';renderNotes();}
function goLevel(id){state.levelId=id!==undefined?id:state.levelId;state.screen='level';render();}
function goMixSelect(){
  if(!mixSelected.length) mixSelected=(state.script==='kata'?LEVELS_KATA:LEVELS).slice(0,2).map(l=>l.id);
  state.screen='mixSelect';render();
}
function goWordSelect(){state.screen='wordSelect';render();}
function quizBack(){if(confirm('종료할까요?'))goHome();}
function confirmReset(){
  if(confirm('모든 진행상황을 초기화할까요?')){
    localStorage.removeItem('hiragana_progress');
    state.progress=initProgress();
    mixSelected=[];wordSelected=[];
    goHome();
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

loadState();
loadNotes();
render();

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (state.screen === 'quiz') {
    // 아직 답 안 한 상태면 무시 (주관식 input은 stopPropagation으로 여기 안 옴)
    if (!quizAnswered) return;
    const nxt = document.getElementById('nxt');
    if (nxt && nxt.style.display !== 'none') { e.preventDefault(); nextQ(); return; }
  }
  // 읽기 연습(플래시카드)에서 Enter → 다음 카드
  if (state.screen === 'readFlash') {
    const focused = document.activeElement?.tagName;
    if (focused !== 'INPUT' && focused !== 'TEXTAREA') { e.preventDefault(); rfMove(1); }
  }
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
